name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Tests · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint, test, and build
        run: npm run ci
        env:
          # Stub client ID so the build succeeds — real value used in deploy only
          VITE_GOOGLE_CLIENT_ID: ci-build-stub
          VITE_BASE_PATH: /
