name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Tests · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint, test, and build
        run: npm run ci
        env:
          # Stub client ID so the build succeeds — real value used in deploy only
          VITE_GOOGLE_CLIENT_ID: ci-build-stub
          VITE_BASE_PATH: /

  browser-e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-e2e.txt

      - name: Install app and browser dependencies
        run: |
          npm ci
          python -m pip install -r requirements-e2e.txt
          python -m playwright install --with-deps chromium

      - name: Build production preview
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ci-build-stub
          VITE_BASE_PATH: /

      - name: Start preview server
        run: |
          mkdir -p test-results/browser
          nohup npm run preview -- --host 127.0.0.1 --port 4173 > test-results/browser/preview.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/build-info.json > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat test-results/browser/preview.log
          exit 1

      - name: Run browser E2E suites
        run: npm run test:e2e
        env:
          E2E_BASE_URL: http://127.0.0.1:4173
          E2E_RESULTS_DIR: test-results/browser

      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-e2e-artifacts
          path: test-results/browser
          if-no-files-found: warn
          retention-days: 14
