name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: Type check · Tests · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Build (no secrets needed for CI build verification)
        run: npm run build
        env:
          # Stub client ID so the build succeeds — real value used in deploy only
          VITE_GOOGLE_CLIENT_ID: ci-build-stub
          VITE_BASE_PATH: /
